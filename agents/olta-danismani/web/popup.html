<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olta Takımı Danışmanı — Sihirli Olta</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
    }

    /* ── Wrapper ── */
    #so-popup {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      position: relative;
    }

    /* ── Header ── */
    .so-header {
      background: linear-gradient(145deg, #1a9e3f 0%, #0f7a30 60%, #0a5e24 100%);
      padding: 28px 24px 20px;
      position: relative;
      overflow: hidden;
    }
    .so-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .so-header::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -30px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .so-header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }
    .so-mascot-img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
      flex-shrink: 0;
    }
    .so-header-text {}
    .so-header-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
      text-transform: uppercase;
    }
    .so-header-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: #7fffb0;
      border-radius: 50%;
      display: inline-block;
    }
    .so-header-title {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 5px;
    }
    .so-header-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.78);
      line-height: 1.4;
    }

    /* Kapat butonu */
    #so-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      width: 30px; height: 30px;
      font-size: 16px;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    #so-close:hover { background: rgba(255,255,255,0.28); }

    /* ── İçerik alanı ── */
    .so-body {
      padding: 24px 22px 28px;
      flex: 1;
    }

    /* ── Form ── */
    .so-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #9ca3af;
      margin-bottom: 14px;
    }

    .so-field { margin-bottom: 12px; }
    .so-field label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .so-req { color: #ef4444; }

    .so-field select,
    .so-field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      -webkit-appearance: none;
      appearance: none;
    }
    .so-field select:focus,
    .so-field input:focus {
      border-color: #22c55e;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.12);
    }

    .so-row { display: flex; gap: 10px; }
    .so-row .so-field { flex: 1; }

    /* Gönder butonu */
    .so-btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(22,163,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .so-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(22,163,74,0.45);
    }
    .so-btn-primary:active { transform: translateY(0); }
    .so-btn-primary:disabled {
      background: #d1d5db;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Yükleme ── */
    #so-loading { display: none; text-align: center; padding: 56px 0; }
    #so-loading.active { display: block; }
    .so-spinner-wrap { position: relative; width: 64px; height: 64px; margin: 0 auto 22px; }
    .so-spinner {
      position: absolute;
      inset: 0;
      border: 4px solid #e5e7eb;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .so-spinner-inner {
      position: absolute;
      inset: 10px;
      border: 3px solid #f0fdf4;
      border-top-color: #86efac;
      border-radius: 50%;
      animation: spin 1.2s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .so-loading-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .so-loading-sub { font-size: 13px; color: #6b7280; }

    /* ── Sonuçlar ── */
    #so-results { display: none; }
    #so-results.active { display: block; }

    .so-results-hero {
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 1.5px solid #bbf7d0;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .so-results-hero img { width: 52px; height: 52px; object-fit: contain; flex-shrink: 0; }
    .so-results-hero-text .rh-title { font-size: 15px; font-weight: 700; color: #14532d; }
    .so-results-hero-text .rh-sub { font-size: 12px; color: #166534; margin-top: 2px; }

    .so-product-card {
      border: 1.5px solid #f3f4f6;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .so-product-card:hover {
      border-color: #bbf7d0;
      box-shadow: 0 2px 10px rgba(34,197,94,0.1);
    }
    .so-product-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .so-product-cat {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #16a34a;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .so-product-price {
      font-size: 16px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
    }
    .so-product-name { font-size: 14px; font-weight: 600; color: #1f2937; margin-bottom: 5px; }
    .so-product-reason { font-size: 12px; color: #6b7280; line-height: 1.55; }

    /* Divider */
    .so-divider { height: 1px; background: #f3f4f6; margin: 16px 0; }

    /* Toplam */
    .so-total-bar {
      background: linear-gradient(135deg, #111827, #1f2937);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .so-total-label { font-size: 13px; color: rgba(255,255,255,0.65); font-weight: 500; }
    .so-total-amount { font-size: 24px; font-weight: 800; color: #fff; }

    /* Sepet butonu */
    .so-cart-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #fff;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(22,163,74,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .so-cart-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(22,163,74,0.45);
    }

    .so-result-note {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 10px;
      text-align: center;
      line-height: 1.5;
    }

    .so-btn-ghost {
      background: none;
      border: 1.5px solid #e5e7eb;
      color: #6b7280;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .so-btn-ghost:hover { border-color: #22c55e; color: #16a34a; }

    /* ── Hata ── */
    #so-error { display: none; text-align: center; padding: 52px 0; }
    #so-error.active { display: block; }
    .so-error-icon {
      width: 60px; height: 60px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
    }
    .so-error-title { font-size: 17px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
    .so-error-detail { font-size: 13px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
  </style>
</head>
<body>
<div id="so-popup">

  <!-- HEADER -->
  <div class="so-header">
    <button id="so-close" aria-label="Kapat">&#x2715;</button>
    <div class="so-header-inner">
      <img src="maskot.png" alt="Sihirli Olta AI" class="so-mascot-img">
      <div class="so-header-text">
        <div class="so-header-badge">AI Danışman</div>
        <div class="so-header-title">Sana Özel<br>Olta Takımı</div>
        <div class="so-header-sub">Stoğumuzdan, bütçene uygun<br>eksiksiz takımını seçiyorum.</div>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="so-body">

    <!-- ADIM 1: FORM -->
    <div id="so-form-step">
      <div class="so-section-label">Bilgilerini gir</div>

      <form id="so-form" novalidate>
        <div class="so-field">
          <label for="av_disiplini">Av Disiplini <span class="so-req">*</span></label>
          <select id="av_disiplini" name="av_disiplini" required>
            <option value="">Seçiniz...</option>
            <option value="spin">Spin (At-Çek)</option>
            <option value="sazancılık">Sazancılık</option>
            <option value="feeder">Feeder</option>
            <option value="surf casting">Surf Casting</option>
            <option value="fly fishing">Fly Fishing (Sinek Oltası)</option>
          </select>
        </div>

        <div class="so-row">
          <div class="so-field">
            <label for="hedef_balik">Hedef Balık</label>
            <input type="text" id="hedef_balik" name="hedef_balik" placeholder="örn: levrek, sazan">
          </div>
          <div class="so-field">
            <label for="ortam">Ortam <span class="so-req">*</span></label>
            <select id="ortam" name="ortam" required>
              <option value="">Seçiniz...</option>
              <option value="kıyı">Kıyı (Deniz)</option>
              <option value="açık deniz">Açık Deniz</option>
              <option value="nehir ağzı">Nehir Ağzı</option>
              <option value="nehir">Nehir / Akarsu</option>
              <option value="göl">Göl / Baraj</option>
            </select>
          </div>
        </div>

        <div class="so-row">
          <div class="so-field">
            <label for="butce_max">Maks. Bütçe (₺) <span class="so-req">*</span></label>
            <input type="number" id="butce_max" name="butce_max" placeholder="örn: 5000" min="0" required>
          </div>
          <div class="so-field">
            <label for="deneyim">Deneyim</label>
            <select id="deneyim" name="deneyim">
              <option value="beginner">Başlangıç</option>
              <option value="intermediate" selected>Orta</option>
              <option value="advanced">İleri</option>
            </select>
          </div>
        </div>

        <div class="so-field">
          <label for="marka_tercihi">Marka Tercihi <span style="font-weight:400;color:#9ca3af">(opsiyonel)</span></label>
          <input type="text" id="marka_tercihi" name="marka_tercihi" placeholder="örn: Shimano, Daiwa — boş bırakabilirsin">
        </div>

        <button type="submit" class="so-btn-primary">Takımımı Öner →</button>
      </form>
    </div>

    <!-- ADIM 2: YÜKLEME -->
    <div id="so-loading">
      <div class="so-spinner-wrap">
        <div class="so-spinner"></div>
        <div class="so-spinner-inner"></div>
      </div>
      <div class="so-loading-title">Takımın hazırlanıyor…</div>
      <div class="so-loading-sub">Blog rehberlerimiz ve stok analiz ediliyor</div>
    </div>

    <!-- ADIM 3: SONUÇLAR -->
    <div id="so-results">
      <div class="so-results-hero">
        <img src="maskot.png" alt="Sihirli Olta AI">
        <div class="so-results-hero-text">
          <div class="rh-title">Takımın hazır!</div>
          <div class="rh-sub" id="so-results-meta"></div>
        </div>
      </div>

      <div id="so-products-list"></div>

      <div class="so-divider"></div>

      <div class="so-total-bar">
        <div class="so-total-label">Toplam Sepet Tutarı</div>
        <div class="so-total-amount" id="so-total-price"></div>
      </div>

      <a href="#" id="so-cart-btn" class="so-cart-btn" target="_top">Tümünü Sepete Ekle →</a>
      <div class="so-result-note" id="so-result-note"></div>

      <div style="text-align:center;margin-top:20px">
        <button class="so-btn-ghost" id="so-restart">Yeni Öneri Al</button>
      </div>
    </div>

    <!-- HATA -->
    <div id="so-error">
      <div class="so-error-icon">&#9888;</div>
      <div class="so-error-title" id="so-error-title">Bir sorun oluştu</div>
      <div class="so-error-detail" id="so-error-detail"></div>
      <button class="so-btn-ghost" id="so-retry">Tekrar Dene</button>
    </div>

  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://atads.app.n8n.cloud/webhook-test/olta-danismani';

  const formStep = document.getElementById('so-form-step');
  const loading  = document.getElementById('so-loading');
  const results  = document.getElementById('so-results');
  const errorDiv = document.getElementById('so-error');
  const allSteps = [formStep, loading, results, errorDiv];

  function showOnly(el) {
    allSteps.forEach(s => { s.style.display = 'none'; });
    el.style.display = 'block';
    window.parent.postMessage({ type: 'so-resize', height: document.body.scrollHeight }, '*');
  }

  document.getElementById('so-close').addEventListener('click', () => {
    window.parent.postMessage({ type: 'so-close' }, '*');
  });

  document.getElementById('so-restart').addEventListener('click', () => showOnly(formStep));
  document.getElementById('so-retry').addEventListener('click', () => showOnly(formStep));

  document.getElementById('so-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;

    const payload = {
      av_disiplini:  form.av_disiplini.value,
      hedef_balik:   form.hedef_balik.value.trim(),
      ortam:         form.ortam.value,
      marka_tercihi: form.marka_tercihi.value.trim() || 'fark etmez',
      butce_max:     parseInt(form.butce_max.value, 10) || 0,
      deneyim:       form.deneyim.value
    };

    if (!payload.av_disiplini || !payload.ortam || !payload.butce_max) {
      alert('Lütfen zorunlu alanları doldurun.');
      return;
    }

    showOnly(loading);

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (data.hata) { showError(data.mesaj || 'Bir hata oluştu.', ''); return; }

      renderResults(data);
      showOnly(results);

    } catch (err) {
      showError('Sunucuya bağlanılamadı.', 'Lütfen internet bağlantınızı kontrol edip tekrar deneyin.');
    }
  });

  function showError(title, detail) {
    document.getElementById('so-error-title').textContent = title;
    document.getElementById('so-error-detail').textContent = detail;
    showOnly(errorDiv);
  }

  function renderResults(data) {
    const list = document.getElementById('so-products-list');
    list.innerHTML = '';
    (data.oneriler || []).forEach(o => {
      const card = document.createElement('div');
      card.className = 'so-product-card';
      card.innerHTML = `
        <div class="so-product-header">
          <span class="so-product-cat">${esc(o.kategori)}</span>
          <span class="so-product-price">${formatTL(o.fiyat)}</span>
        </div>
        <div class="so-product-name">${esc(o.urun_adi)}</div>
        <div class="so-product-reason">${esc(o.neden)}</div>
      `;
      list.appendChild(card);
    });

    document.getElementById('so-total-price').textContent = formatTL(data.toplam_fiyat);

    const cartBtn = document.getElementById('so-cart-btn');
    cartBtn.href = data.sepet_linki || '#';

    const profil = data.musteri_profili || {};
    document.getElementById('so-results-meta').textContent =
      [profil.av_disiplini, profil.ortam, formatTL(profil.butce_max) + ' bütçe']
        .filter(Boolean).join(' · ');

    document.getElementById('so-result-note').textContent = data.not || '';
  }

  function formatTL(val) {
    if (val == null || val === '') return '';
    return new Intl.NumberFormat('tr-TR', {
      style: 'currency', currency: 'TRY', maximumFractionDigits: 0
    }).format(val);
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
